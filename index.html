<!DOCTYPE html>
<html lang="sv">
    <head>
        <meta charset="utf-8">
        <title>Beställ direkt</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header></header>
        <nav>
            <a>Frukost</a>
            <a>Lunch/Middag</a>
            <a>Bakverk</a>
            <a>AW/kväll</a>
        </nav>
        <header>
            <h1>Beställ direkt</h1>
            <button class="profile-btn">👤</button>
        </header>
        <nav></nav>
        <main>
            <div class="karta">
                <h1 class="sök"> Sök...</h1>
            </div>
            <div> <!--Kategorier börjar här-->
                <section class="catering">
                    <h2>
                        Kategorier
                    </h2>
                    <div class="cards">
                        
                        <div class="card_column">
                            <div class="card_content">
                                <a href="#"> 
                                    <picture>
                                        <source srcset="/images/sushi.jpg" id="sushi_img">
                                        <img src="/images/sushi.jpg" alt="Bild på sushi" id="sushi_img" class="cards_images">
                                    </picture>
                                    <h3>
                                        sushi
                                    </h3>
                                </a>
                            </div>
                        </div>
                        
                        <div class="card_column">
                            <div class="card_content">
                                <a href="#"> 
                                    <picture>
                                        <source srcset="/images/libanesisk.jpg" id="libanesisk_img">
                                        <img src="/images/libanesisk.jpg" alt="Bild på libanesisk mat" id="libanesisk_img" class="cards_images">
                                    </picture>
                                    <h3>
                                        Libanesisk
                                    </h3>
                                </a>
                            </div>
                        </div>

                        <div class="card_column">
                            <div class="card_content">
                                <a href="#"> 
                                    <picture>
                                        <source srcset="/images/sweets.jpg" id="sweets_img">
                                        <img src="/images/sweets.jpg" alt="Bild på bakverk" id="sweets_img" class="cards_images">
                                    </picture>
                                    <h3>
                                        Bakverk
                                    </h3>
                                </a>
                            </div>
                        </div>

                    </div>

                </section> 
            </div> <!--Kategorier slutar här-->
            

        </main>
        <aside></aside>
        <footer>
            <h2>Beställ direkt</h2>
            <p>© Beställ direkt 2026</p>
        </footer>
    </body>
</html>
